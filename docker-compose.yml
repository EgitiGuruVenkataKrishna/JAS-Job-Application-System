version: "3.9"

services:
  jas-agent:
    build: .
    container_name: jas-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./src/documents/resume_template.tex:/app/src/documents/resume_template.tex
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
